<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Câu Rồng Vạn Cân</title>
<style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #ui {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        background: rgba(0,0,0,0.5);
        padding: 10px;
        width: 260px;
        font-size: 14px;
    }
    .npcLabel {
        position: absolute;
        color: yellow;
        font-size: 12px;
    }
</style>
</head>
<body>

<div id="ui">
<b>🎮 CÂU RỒNG VẠN CÂN</b><br><br>
NPC1: Bán cần câu<br>
NPC2: Bán sách kỹ năng (12 skill)<br><br>
🎯 Kỹ năng:
<div id="skills"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,10,10);
scene.add(light);

// ===== GROUND MAP =====
const groundGeo = new THREE.PlaneGeometry(50,50);
const groundMat = new THREE.MeshStandardMaterial({color:0x228B22});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PLAYER =====
const player = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0x00aaff})
);
player.position.y = 1;
scene.add(player);

// ===== FISHING ROD =====
const rod = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05,0.05,3),
    new THREE.MeshStandardMaterial({color:0x8B4513})
);
rod.position.set(1,2,0);
player.add(rod);

// ===== NPC 1 (bán cần) =====
const npc1 = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xff0000})
);
npc1.position.set(-6,1,0);
scene.add(npc1);

// ===== NPC 2 (bán skill) =====
const npc2 = new THREE.Mesh(
    new THREE.BoxGeometry(1,2,1),
    new THREE.MeshStandardMaterial({color:0xffa500})
);
npc2.position.set(6,1,0);
scene.add(npc2);

// ===== DRAGON (RỒNG CÂU) =====
const dragon = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 32, 32),
    new THREE.MeshStandardMaterial({color:0x800080})
);
dragon.position.set(0,1,-10);
scene.add(dragon);

// ===== SKILLS =====
const skills = [
"Long Lực","Thần Câu","Tăng Tốc Câu","Hút Rồng","Hóa Băng",
"Thiên Lôi","Ẩn Thân","Bạo Kích","Hồi Máu","Tăng May Mắn",
"Triệu Hồi","Câu Thần"
];

document.getElementById("skills").innerHTML =
skills.map((s,i)=> (i+1)+". "+s).join("<br>");

// ===== MOVEMENT =====
let keys = {};
document.addEventListener("keydown", e=>keys[e.key]=true);
document.addEventListener("keyup", e=>keys[e.key]=false);

function movePlayer(){
    if(keys["w"]) player.position.z -= 0.2;
    if(keys["s"]) player.position.z += 0.2;
    if(keys["a"]) player.position.x -= 0.2;
    if(keys["d"]) player.position.x += 0.2;
}

// ===== CAMERA FOLLOW =====
function updateCamera(){
    camera.position.x = player.position.x;
    camera.position.z = player.position.z + 10;
    camera.lookAt(player.position);
}

// ===== ANIMATION LOOP =====
function animate(){
    requestAnimationFrame(animate);
    movePlayer();
    updateCamera();

    dragon.position.y = 1 + Math.sin(Date.now()*0.002)*1;

    renderer.render(scene,camera);
}
animate();

// ===== RESIZE =====
window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
